<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analyst | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* درجات الألوان للوضع النهاري بناءً على اختيارك #6432a8 */
            --bg-body: #f3effb; 
            --card-bg: #ffffff;
            --text-main: #2d1b4d;
            --accent: #6432a8; 
            --shadow: rgba(100, 50, 168, 0.1);
        }

        [data-theme="dark"] {
            /* درجات الألوان للوضع الليلي */
            --bg-body: #0d0915;
            --card-bg: #1a1425;
            --text-main: #e0d5f2;
            --accent: #9d66eb;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0; padding: 80px 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s ease;
        }

        /* زر التبديل */
        .theme-toggle {
            position: fixed; top: 25px; right: 25px;
            background: var(--accent); border: none;
            color: white; padding: 10px; border-radius: 50%;
            cursor: pointer; z-index: 1000; width: 45px; height: 45px;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex; align-items: center; justify-content: center;
        }

        /* قسم التعريف - بساطة سهى */
        .header {
            text-align: center; max-width: 700px; margin-bottom: 70px;
        }

        .header h1 { font-size: 2.8rem; margin-bottom: 15px; font-weight: 600; color: var(--accent); }
        .header p { font-size: 1.1rem; line-height: 1.8; opacity: 0.9; }

        .social-nav { display: flex; justify-content: center; gap: 25px; margin-top: 30px; }
        .social-nav a { color: var(--text-main); font-size: 24px; transition: 0.3s; text-decoration: none; }
        .social-nav a:hover { color: var(--accent); transform: translateY(-3px); }

        /* شبكة المشاريع */
        .projects-section { width: 100%; max-width: 900px; }
        .projects-title { margin-bottom: 30px; font-weight: 600; font-size: 1.5rem; border-right: 4px solid var(--accent); padding-right: 15px; text-align: left;}
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 35px; border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow);
            transition: 0.4s; border: 1px solid transparent;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(100, 50, 168, 0.15);
        }
