<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملفي الشخصي | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* تعريف الألوان المتغيرة */
        :root {
            --bg-color: #fff0f5; /* وردي فاتح جداً للوضع النهاري */
            --text-color: #4a4a4a;
            --accent-color: #ffb6c1; /* وردي متوسط */
            --card-bg: #ffffff;
            --button-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #ffc0cb; /* نص وردي فاتح في الوضع الليلي */
            --accent-color: #ff69b4;
            --card-bg: #2d2d2d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            margin-bottom: 20px;
        }

        h1 { margin: 10px 0; font-size: 24px; }
        p { font-size: 16px; line-height: 1.6; opacity: 0.8; }

        .social-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: var(--text-color);
            font-size: 24px;
            transition: transform 0.3s;
            text-decoration: none;
        }

        .social-links a:hover {
            color: var(--accent-color);
            transform: translateY(-5px);
        }

        /* زر التبديل */
        .theme-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            cursor: pointer;
            background: var(--accent-color);
            color: var(--button-text);
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">
        <i class="fas fa-moon"></i> الوضع الليلي
    </button>

    <div class="container">
        <img src="https://via.placeholder.com/120" alt="صورة شخصية" class="profile-img">
        
        <h1>اسمي هنا</h1>
        <p>مصممة ومطورة مواقع | شغوفة ببناء تجارب مستخدم جميلة وبسيطة.</p>

        <div class="social-links">
