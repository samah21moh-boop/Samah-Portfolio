<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samah Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8c52ff; /* اللون البنفسجي الفاتح */
            --bg: #fcfaff;
            --text: #333;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: white;
            border-bottom: 1px solid #eee;
        }

        /* تنسيق الشعار ليكون واضحاً */
        .main-logo {
            max-width: 350px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            color: var(--primary);
            font-size: 18px;
            width: 35px;
            height: 35px;
            border: 1px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover {
            background: var(--primary);
            color: white;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 30px 20px;
        }

        section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h2 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .cv-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }

        .contact-me {
            background: var(--primary) !important;
            color: white;
            text-align: center;
        }

        .contact-me h2 { color: white; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/Y7hZ4vS/logo-png.jpg" alt="Samah Mohmed Logo" class="main-logo">
        
        <div class="social-icons">
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="container">
        <section>
            <h2>About Me</h2>
            <p>[تحدثي عن نفسك هنا]</p>
        </section>

        <div style="text-align: center; margin-bottom: 30px;">
            <a href="#" class="cv-btn"><i class="fas fa-file-pdf"></i> CV</a>
        </div>

        <section>
            <h2>Skills</h2>
            <p>[اذكري مهاراتك هنا]</p>
        </section>

        <section>
            <h2>Projects</h2>
            <p>[اعرضي مشاريعك هنا]</p>
        </section>

        <section class="contact-me">
            <h2>Contact Me</h2>
            <p>Email: example@mail.com</p>
            <div class="social-icons" style="margin-top: 15px;">
                <a href="#" style="background: white;"><i class="fas fa-envelope"></i></a>
                <a href="#" style="background: white;"><i class="fab fa-whatsapp"></i></a>
            </div>
        </section>
    </div>

    <footer style="text-align: center; padding: 20px; opacity: 0.5; font-size: 12px;">
        © 2026 Samah Mohmed
    </footer>

</body>
</html>
