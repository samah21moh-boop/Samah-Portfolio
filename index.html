<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samah Mohmed | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6432a8;
            --bg: #fcfaff;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text: #332d41;
            --text-light: #6432a8;
            --secondary-bg: #f3efff;
            --border: #eeeeee;
        }

        [data-theme="dark"] {
            --bg: #0d0b14;
            --header-bg: #161421;
            --card-bg: #1a1726;
            --text: #e0dced;
            --text-light: #a37df0;
            --secondary-bg: #241f3a;
            --border: #2d2845;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.4s ease;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        /* حاوية اللوجو الدائري الجديد */
        .logo-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(100, 50, 168, 0.15);
            border: 2px solid var(--primary);
        }

        .hello-text { font-size: 1.4rem; color: var(--primary); font-weight: 300; display: block; }
        .name-text { font-size: 2.8rem; font-weight: 700; color: var(--text); margin-bottom: 20px; }

        .social-links { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .social-links a {
            font-size: 18px; color: var(--primary); background: var(--secondary-bg);
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
        }
        .social-links a:hover { background: var(--primary); color: white; transform: translateY(-3px); }

        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        section {
            background-color: var(--card-bg); padding: 30px; border-radius: 20px;
            margin-bottom: 30px; border: 1px solid var(--border);
        }

        h2 { color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        h2::after { content: ""; height: 1px; flex: 1; background: var(--border); }

        .cv-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background-color: var(--primary); color: white !important;
            padding: 12px 30px; text-decoration: none; border-radius: 50px;
            font-weight: 600; transition: 0.3s;
        }

        .theme-toggle {
            position: absolute; left: 20px; top: 20px;
            background: var(--secondary-bg); color: var(--primary);
            border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <button class="theme-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
        
        <div class="logo-container">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 140px;">
                <circle cx="100" cy="100" r="95" fill="none" stroke="#6432a8" stroke-width="1" stroke-dasharray="4,2"/>
                <text x="100" y="115" font-family="'serif'" font-size="90" fill="#6432a8" text-anchor="middle" font-style="italic">S</text>
                <text x="100" y="150" font-family="Cairo" font-size="10" fill="#332d41" text-anchor="middle" letter-spacing="3" font-weight="bold">SAMAH MOHMED</text>
                <path d="M60 120 L140 120" stroke="#6432a8" stroke-width="0.5" opacity="0.3"/>
            </svg>
        </div>
        
        <div class="welcome-text">
            <span class="hello-text">Hello,</span>
            <h1 class="name-text">Samah Mohmed</h1>
        </div>

        <div class="social-links">
            <a href="mailto:samah.21moh@gmail.com"><i class="fas fa-envelope"></i></a>
            <a href="https://www.linkedin.com/in/samah-alhumaidi-061179205" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://wa.me/966597722559" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </header>

    <div class="container">
        <section>
            <h2>About Me</h2>
            <p>Data Analyst with a passion to uncover the mysteries of data. I believe that data is the best source of guidance for any business decision.</p>
        </section>

        <div style="text-align: center; margin-bottom: 30px;">
            <a href="https://drive.google.com/file/d/14bgzBDAcOiLd4_br1J06nI0Z33oNadrR/view?usp=drive_link" target="_blank" class="cv-btn">
                <i class="fas fa-download"></i> Download CV
            </a>
        </div>
        
        </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        btn.onclick = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                btn.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }
    </script>
</body>
</html>
