<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8c52ff; 
            --primary-light: #b388ff; 
            --bg-color: #fcfaff;
            --card-bg: #ffffff;
            --text-color: #443a5a;
            --shadow: 0 5px 20px rgba(140, 82, 255, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #0d0b14;
            --card-bg: #161421;
            --text-color: #e0dced;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: 0.3s;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            position: relative;
        }

        /* تنسيق الصورة */
        .welcome-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            margin: 0 auto 15px;
            overflow: hidden; /* لضمان بقاء الصورة داخل الدائرة */
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* لجعل الصورة تملأ الدائرة بدون تمطيط */
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
        }

        .social-links a {
            font-size: 16px; /* أيقونات صغيرة */
            color: white;
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .container { max-width: 800px; margin: auto; padding: 20px; }

        section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        h2 { color: var(--primary-color); font-size: 1.4rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .cv-btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .theme-toggle {
            position: absolute; left: 20px; top: 20px;
            background: none; border: 1px solid white; color: white;
            cursor: pointer; padding: 5px 10px; border-radius: 15px;
        }
    </style>
</head>
<body>

    <header>
        <button class="theme-toggle" id="theme-toggle">Dark Mode</button>
        
        <div class="welcome-image">
            <img src="my-photo.jpg" alt="Profile" onerror="this.style.display='none';">
            <i class="fas fa-user" style="color:#ccc; font-size: 40px;"></i>
        </div>
        
        <h1 class="profile-name">[اسمك]</h1>
        <div class="social-links">
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="container">
        <section>
            <h2>About Me</h2>
            <p>اكتبي هنا تعريفاً عنك...</p>
        </section>

        <section style="text-align: center;">
            <a href="#" class="cv-btn"><i class="fas fa-file-download"></i> CV</a>
        </section>

        <section>
            <h2>Skills</h2>
            <p>المهارات هنا...</p>
        </section>

        <section>
            <h2>Projects</h2>
            <p>المشاريع هنا...</p>
        </section>

        <section style="background: var(--primary-color); color: white; text-align: center;">
            <h2 style="color: white; border: none;">Contact Me</h2>
            <p>Email: example@mail.com</p>
        </section>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        btn.onclick = () => {
            const theme = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
